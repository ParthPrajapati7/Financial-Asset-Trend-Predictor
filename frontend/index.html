<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Asset Trend Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/Login.css" />
  </head>
  <body>
    <div class="full-screen-container">
      <div class="bg-glow bg-glow-1"></div>
      <div class="bg-glow bg-glow-2"></div>
      <div class="login-container">
        <div class="login-header">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          </div>
          <h1 class="login-title">Asset Trend Predictor</h1>
          <p class="login-subtitle">Access advanced predictive analytics & market forecasts</p>
        </div>
        <form class="form" id="login-form">
          <div class="input-group" id="email-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="name@company.com" required />
            <span class="msg">Valid Email</span>
          </div>

          <div class="input-group" id="password-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
            <span class="msg">Incorrect Password</span>
          </div>

          <button type="submit" class="login-button">
            <span>Access Platform</span>
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="button-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </button>
        </form>
      </div>
    </div>
    <div id="root"></div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");

        if (params.has("email")) emailInput.value = params.get("email");
        if (params.has("password"))
          passwordInput.value = params.get("password");

        const emailGroup = document.getElementById("email-group");
        const passwordGroup = document.getElementById("password-group");
        const loginScreen = document.querySelector(".full-screen-container");
        const root = document.getElementById("root");

        // Restore authenticated state on page reload
        if (localStorage.getItem("authenticated") === "true") {
          loginScreen.classList.add("hidden");
          root.classList.add("authenticated");
        }

        function setGroupState(group, state, message) {
          group.classList.remove("success", "error");
          if (state) group.classList.add(state);
          const msg = group.querySelector(".msg");
          if (message) msg.textContent = message;
        }

        function isValidEmail(value) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        document
          .getElementById("login-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            let valid = true;

            if (!email) {
              setGroupState(emailGroup, "error", "Email is required");
              valid = false;
            } else if (!isValidEmail(email)) {
              setGroupState(emailGroup, "error", "Enter a valid email address");
              valid = false;
            } else {
              setGroupState(emailGroup, "success", "Valid Email");
            }

            if (!password) {
              setGroupState(passwordGroup, "error", "Password is required");
              valid = false;
            } else {
              setGroupState(passwordGroup, "success", "Password accepted");
            }

            if (!valid) return;

            // Persist authentication state
            localStorage.setItem("authenticated", "true");
            loginScreen.classList.add("hidden");
            root.classList.add("authenticated");
          });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
